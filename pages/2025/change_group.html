<div class="ChangeGroup">
    <h4 class="ChangeGroupTitle">
        {{category}}
    </h4>
    <ul class="Changes">
        {{change_items}}

        <li class="buff">
            <span class="ChangeLabel">Turn Speed:</span>
            <span class="ChangeValue">
                <s class="OldValue">0.8</s> 
                <i class="fa-solid fa-arrow-right ChangeArrow"></i> 
                <strong class="NewValue">1.2</strong>
            </span>
        </li>
        <li class="buff">
            <span class="ChangeLabel">Lift Factor:</span>
            <span class="ChangeValue">
                <s class="OldValue">7</s> 
                <i class="fa-solid fa-arrow-right ChangeArrow"></i> 
                <strong class="NewValue">10</strong>
            </span>
        </li>
    </ul>
</div>
