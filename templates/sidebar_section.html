<div class="NavSection active">

<button class="SectionToggle"
aria-expanded="true"
data-target="{{section_id}}-items">

<i class="{{section_icon}} SectionIcon"></i>

<span class="SectionTitle">
{{section_title}}
</span>

<span class="ItemCount">
{{item_count}}
</span>

<i class="fas fa-chevron-down ToggleIcon"></i>

</button>

<ul class="SectionItems" id="{{section_id}}-items">

{{section_items}}

</ul>

</div>
